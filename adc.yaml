# podman play kube — app + postgres 2컨테이너 1 pod (doc/31 C2). pod netns 공유 → app 은 localhost:5432 로 db 접속.
# PGDATA = host /opt/adc → /var/lib/postgresql/data (하위 pgdata 서브디렉터리 = 마운트 비-빈 시 initdb 충돌 회피).
# exports(CSV)는 PGDATA 밖 — 서빙 pod 엔 미마운트, CLI one-off run 에서 /opt/adc-exports→/exports 마운트(doc/31 B3/B4).
# hostNetwork: 컨테이너→LAN 운영 Loki(192.168.8.100:3200) egress 위해 host 네트워크 사용(기본 bridge 는 LAN 도달 불가, doc/32 §3).
#   → app 은 host:8080, postgres 는 host:5432 로 직접 바인드. app↔db 는 동일 host netns 의 localhost:5432.
apiVersion: v1
kind: Pod
metadata:
  name: adc
  labels:
    app: apidiscover
spec:
  hostNetwork: true
  containers:
    - name: db
      image: docker.io/library/postgres:16-alpine
      env:
        - name: POSTGRES_DB
          value: adc
        - name: POSTGRES_USER
          value: adc
        - name: POSTGRES_PASSWORD
          value: adc
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
    - name: app
      image: localhost/apidiscover:test
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: container
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://localhost:5432/adc   # pod netns 공유 → localhost
        - name: SPRING_DATASOURCE_USERNAME
          value: adc
        - name: SPRING_DATASOURCE_PASSWORD
          value: adc
        # --- 스캔 부하 = application.yml 기본값 사용 (D58 안정화: 공격적 버스트 override 제거) ---
        # domains-per-tick(100)·tick-interval(PT5M)·max-queries-per-hour(3000)·page-limit(2000) 은 기본값.
        # 공격적 버스트(300/PT3M/16000/5000, D56 후속)는 Loki 타임아웃 급증 유발로 제거. 필요 시 여기 env 로만 재상향(재빌드 불요).
        - name: APIDISCOVER_SCAN_OFFPEAKZONE          # scan.off-peak-zone ""→Asia/Seoul (버스트 값 아님 — off-peak 01-06 을 KST 실 저부하에 정렬, 유지)
          value: "Asia/Seoul"
        - name: APIDISCOVER_SCAN_OFFPEAKDOMAINSPERTICK  # scan.off-peak-domains-per-tick =주간 domains-per-tick 500 로 일치(사용자 요청, 주야 균일). Loki 는 캡3000/h 로 보호
          value: "500"
        - name: APIDISCOVER_SCAN_OFFPEAKMAXWINDOW      # scan.off-peak-max-window =주간 max-window PT30M 로 일치(사용자 요청). ★PT24H 대량조회는 복구 금지(과부하 이력)
          value: "PT30M"
        - name: APIDISCOVER_SCAN_INACTIVEAFTER         # scan.inactive-after P30D→P3D (무접속 자동스캔 제외 임계, D59 lastSeenAt 기준. self-healing: 트래픽 재개 시 자동 복귀. fleet 축소·발산 완화)
          value: "P3D"
        # --- A(D60) 쿼리수 감소: chunk·slice 함께 PT10M→PT30M (collectBounded 가 slice 단위 조회 → 유효 청크=min(slice,chunk). 함께 올려야 3× 감소) ---
        - name: APIDISCOVER_LOKI_CHUNKWINDOW           # loki.chunk-window PT10M→PT30M (query_range 1회 시간창↑ → 도메인-시간당 쿼리 1/3)
          value: "PT30M"
        - name: APIDISCOVER_SCAN_SLICEWINDOW           # scan.slice-window PT10M→PT30M (부분전진 슬라이스=유효 청크 캡, chunk 와 동반 상향)
          value: "PT30M"
        - name: APIDISCOVER_SCAN_TICKINTERVAL          # scan.tick-interval PT2M→PT1M (주야 공통. 틱 주기 최소화 — 워터마크 최대 빈도 전진. delta-driven+캡3000 이 Loki 보호)
          value: "PT1M"
        - name: APIDISCOVER_SCAN_DOMAINSPERTICK        # scan.domains-per-tick 500 (주간=off-peak 동일). 틱당 처리량↑, 대부분 cheap skip, 실조회는 캡3000/h 보호
          value: "500"
        - name: APIDISCOVER_DISCOVERY_EXCLUDEDHOSTNAMES  # D62 대상 제외 엣지(사용자 확정 AAJ 23개) — 등록·lastSeen·스캔 조회 제외. fleet -37%(전용 20,880 별도 비활성화)
          value: "AAJ11,AAJ12,AAJ13,AAJ14,AAJ21,AAJ22,AAJ23,AAJ24,AAJ31,AAJ32,AAJ33,AAJ34,AAJ41,AAJ42,AAJ43,AAJ44,AAJ51,AAJ52,AAJ53,AAJ54,AAJ61,AAJ62,AAJ63"
        - name: APIDISCOVER_SCAN_QUERYBATCHSIZE       # D63 배칭: 같은 엣지 실조회 도메인 10개→1쿼리(|~ OR, 0=off). 시작값 10, 계측 후 조정
          value: "10"
        - name: APIDISCOVER_SCAN_EDGEGROUPMAINONLY    # D65: 그룹 Master 엣지만 조회(활성 매핑 -47%, 고아는 Master 치환으로 커버). 사용자 확정 ㉮
          value: "true"
        - name: APIDISCOVER_SCAN_SAMPLEWINDOW         # D66 롤링 샘플링: 최신 10분 표본만 조사(33% 커버리지·신선도<=30분·발산 정지). 사용자 확정 ②안
          value: "PT10M"
        - name: APIDISCOVER_SCAN_MAXQUERIESPERHOUR    # D66 동반: 3000→6000 (샘플링 수요 ~5-6k/h. 배칭+Main-only 로 쿼리당 Loki 부하 대폭 감소 후라 안전)
          value: "6000"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE   # 설정값 검증용 configprops 노출(내부)
          value: "health,info,metrics,configprops"
      volumeMounts:
        - name: adclog
          mountPath: /opt/adc-log      # D58: 로그를 컨테이너 외부(hostPath)로 영속
      ports:
        - containerPort: 8080      # hostNetwork=true 라 host:8080 직접 바인드(hostPort 매핑 불요)
  volumes:
    - name: pgdata
      hostPath:
        path: /opt/adc            # 사용자 확정 PGDATA 마운트. 사전 생성 필요(mkdir -p)
        type: Directory
    - name: adclog
      hostPath:
        path: /opt/adc-log        # D58 로그 마운트(컨테이너 외부). 사전 생성+SELinux relabel 필요:
        type: Directory           #   mkdir -p /opt/adc-log && chcon -Rt container_file_t /opt/adc-log
                                  # (el8 SELinux Enforcing — 미적용 시 컨테이너 쓰기 Permission denied → 앱 크래시루프. pgdata /opt/adc 와 동일)
