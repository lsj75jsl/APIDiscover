# podman play kube — app + postgres 2컨테이너 1 pod (doc/31 C2). pod netns 공유 → app 은 localhost:5432 로 db 접속.
# PGDATA = host /opt/adc → /var/lib/postgresql/data (하위 pgdata 서브디렉터리 = 마운트 비-빈 시 initdb 충돌 회피).
# exports(CSV)는 PGDATA 밖 — 서빙 pod 엔 미마운트, CLI one-off run 에서 /opt/adc-exports→/exports 마운트(doc/31 B3/B4).
# hostNetwork: 컨테이너→LAN 운영 Loki(192.168.8.100:3200) egress 위해 host 네트워크 사용(기본 bridge 는 LAN 도달 불가, doc/32 §3).
#   → app 은 host:8080, postgres 는 host:5432 로 직접 바인드. app↔db 는 동일 host netns 의 localhost:5432.
apiVersion: v1
kind: Pod
metadata:
  name: adc
  labels:
    app: apidiscover
spec:
  hostNetwork: true
  containers:
    - name: db
      image: docker.io/library/postgres:16-alpine
      env:
        - name: POSTGRES_DB
          value: adc
        - name: POSTGRES_USER
          value: adc
        - name: POSTGRES_PASSWORD
          value: adc
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
    - name: app
      image: localhost/apidiscover:test
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: container
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://localhost:5432/adc   # pod netns 공유 → localhost
        - name: SPRING_DATASOURCE_USERNAME
          value: adc
        - name: SPRING_DATASOURCE_PASSWORD
          value: adc
        # --- 스캔/Loki 부하 설정 = application.yml 기본값 사용 (D67) ---
        # 테스트 서버에서 검증된 튜닝(D58~D67: 주야 균일 PT1M/500 틱, chunk·slice PT30M, inactive-after P3D,
        # AAJ 23개 제외, 배칭 20, Main-only, 샘플링 PT10M, 캡 6000/h)을 전부 application.yml 기본값으로 승격 —
        # 다른 서버도 env override 없이 기본값 배포만으로 동일 동작. 필요 시 여기 env 로만 조정(재빌드 불요).
        # ★off-peak-max-window PT24H 대량조회는 복구 금지(Loki 과부하 이력).
        # D74: page-limit 5000·domains-per-tick 650 은 application.yml 기본값에 반영됨(재빌드로 baked) → env override 불요.
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE   # 설정값 검증용 configprops 노출(내부)
          value: "health,info,metrics,configprops"
      volumeMounts:
        - name: adclog
          mountPath: /opt/adc-log      # D58: 로그를 컨테이너 외부(hostPath)로 영속
      ports:
        - containerPort: 8080      # hostNetwork=true 라 host:8080 직접 바인드(hostPort 매핑 불요)
  volumes:
    - name: pgdata
      hostPath:
        path: /opt/adc            # 사용자 확정 PGDATA 마운트. 사전 생성 필요(mkdir -p)
        type: Directory
    - name: adclog
      hostPath:
        path: /opt/adc-log        # D58 로그 마운트(컨테이너 외부). 사전 생성+SELinux relabel 필요:
        type: Directory           #   mkdir -p /opt/adc-log && chcon -Rt container_file_t /opt/adc-log
                                  # (el8 SELinux Enforcing — 미적용 시 컨테이너 쓰기 Permission denied → 앱 크래시루프. pgdata /opt/adc 와 동일)
    # ※ /dev/shm 확대(emptyDir medium:Memory)는 D77 에서 시도했으나 el8 SELinux 가 tmpfs 를 컨테이너 라벨로
    #    relabel 하지 않아 PG 가 공유메모리 세그먼트 접근 거부(FATAL 크래시루프) → 롤백. 병렬 유지보수는 비병렬
    #    (PARALLEL 0 / max_parallel_maintenance_workers=0)으로 수행하면 /dev/shm 불요(D77 재검토).
