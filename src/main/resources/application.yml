spring:
  application:
    name: apidiscover-worker
  task:
    scheduling:
      pool:
        size: 2               # ③ 스캐너 스레드 격리 — scanTick·discover 별 스레드(단일 풀 블로킹 기아 해소, doc/33 §14)
  datasource:
    url: jdbc:h2:mem:apidiscover;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  batch:
    job:
      enabled: false          # 잡은 스케줄러가 트리거 (기동 시 자동 실행 금지)
    jdbc:
      initialize-schema: always

# API Discovery 설정 (doc/05 §5, doc/07 §4)
apidiscover:
  loki:                       # 접속값은 sample/loki_sample.py 기준 (인증 없음)
    addr: "http://192.168.8.100:3200"
    job-label: "access_log"
    query-timeout: "30s"
    # --- 운영 서버 부하 보호 (doc/05 §2.4, §6) ---
    chunk-window: "PT10M"          # range query 1회당 시간창
    page-limit: 2000               # query_range limit (유한값, 1e8 금지)
    max-concurrent-queries: 2      # Loki 동시 쿼리 상한
    min-query-interval: "200ms"    # 쿼리 간 최소 간격(스로틀)
  schedule:
    default-interval: "PT1H"       # 도메인별 override 없으면 적용
    ingest-lag: "PT10M"
    initial-backfill: "P7D"
    off-peak-window: "01:00-06:00" # (선택) 백필/대용량 저부하 시간대
  scan:                            # 엔드포인트 스캔 부하 운영정책 (doc/33, B+A+E + PR1.1 §14)
    tick-interval: "PT5M"          # B 스캔 틱(전수순회 대체) — 구 schedule.default-interval 트리거 대체
    domains-per-tick: 100          # B 틱당 도메인 예산(least-recently-scanned 상위 K)
    max-window: "PT30M"            # A per-scan 윈도우 상한(②: PT6H→PT30M, 백필 슬라이스, 0=무제한)
    slice-window: "PT10M"          # ① 부분전진 슬라이스 단위(미지정=loki.chunk-window)
    max-queries-per-scan: 50       # ① per-scan 하드캡(슬라이스 경계, 0=무제한=현행)
    max-queries-per-hour: 3000     # E 전역 시간당 쿼리 하드캡(0=무제한)
    max-bytes-per-hour: 0          # E 전역 시간당 바이트 하드캡(0=무제한)
    throttle-on-error: true        # E 429/5xx 적응형 자동감속
    # --- C 활동 티어 + F dormant + D off-peak (doc/33 §4–6, D48) ---
    tiering-enabled: true          # C false=PR1 LRS 동작(무회귀 롤백 스위치)
    active-interval: "PT30M"       # C active 주기(lastSeenAt 최근)
    default-interval: "PT2H"       # lastSeenAt 부재(신호 없음)
    inactive-interval: "PT6H"      # C inactive 주기
    active-threshold: "PT24H"      # C lastSeenAt age 이내=active
    off-peak-domains-per-tick: 500 # D off-peak 틱당 도메인 K 상향
    off-peak-max-window: "PT24H"   # D off-peak 백필 윈도우 상향
    off-peak-zone: ""              # D 빈값=시스템 기본 zone
    dormant-after: "P14D"          # F dormant 진입 age(삭제 아님, 최장 주기로 강등)
    dormant-interval: "P1D"        # F dormant 최장 주기
    inactive-after: "P30D"         # ★무접속 중단: 마지막 접속(lastSeenAt) > 이 기간이면 스캔(수집+평가) 제외(0=비활성). 트래픽 재개 시 자동 재개
    query-batch-size: 0            # D63 배칭: 같은 엣지 실조회 도메인 N개를 1쿼리로(0=off). Loki 청크 재읽기 1/N
    edge-group-main-only: false    # D65: 엣지를 그룹 Master 로 치환 조회(Master 로그=그룹 전체 집계). false=off
    # off-peak-max-queries-per-hour(쿼리캡 상향)는 범위 밖 — K·max-window 스위치만(doc/33 §5, D48)
    # schedule.off-peak-window("01:00-06:00") 재사용 — off-peak 시각대 판정
  discovery:                       # 도메인 자동 디스커버리 (doc/30, 서버측 집계)
    enabled: true
    interval: "PT10M"              # 롤링 주기
    window: "PT12M"                # interval + 오버랩(경계 누락 방지)
    bootstrap-window: "PT1H"       # 빈 도메인 DB 첫 실행 1회
    initial-delay: "PT2M"          # 스캔 스케줄과 stagger
    max-domains-per-run: 0         # 0=무제한(전수 등록), >0=카운트 desc 상위 N 캡
    host-pattern: "^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$"
    excluded-hostnames: []         # D62 대상 제외 엣지(hostname 라벨) — 등록·lastSeen 갱신·스캔 조회 모두 제외. 빈=없음
  central:
    base-url: "https://central.internal"
  normalization:                 # 고카디널리티 방지 (doc/13)
    max-templates-per-host: 5000       # host 당 distinct template 상한
    max-query-params-per-endpoint: 50  # endpoint 당 distinct query param 상한
    stat-var-ratio: 0.3                # distinct/requests 승격 임계
    stat-var-min-distinct: 20          # 소표본 오승격 방지
    stat-var-min-convergence: 0.7      # false merge 방지(수렴)
    value-len-bucket-bounds: [8, 32, 128]  # value 길이 버킷 상한(포함)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
