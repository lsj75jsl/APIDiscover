spring:
  application:
    name: apidiscover-worker
  datasource:
    url: jdbc:h2:mem:apidiscover;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  batch:
    job:
      enabled: false          # 잡은 스케줄러가 트리거 (기동 시 자동 실행 금지)
    jdbc:
      initialize-schema: always

# API Discovery 설정 (doc/05 §5, doc/07 §4)
apidiscover:
  loki:                       # 접속값은 sample/loki_sample.py 기준 (인증 없음)
    addr: "http://192.168.8.100:3200"
    job-label: "access_log"
    query-timeout: "30s"
    # --- 운영 서버 부하 보호 (doc/05 §2.4, §6) ---
    chunk-window: "PT10M"          # range query 1회당 시간창
    page-limit: 2000               # query_range limit (유한값, 1e8 금지)
    max-concurrent-queries: 2      # Loki 동시 쿼리 상한
    min-query-interval: "200ms"    # 쿼리 간 최소 간격(스로틀)
  schedule:
    default-interval: "PT1H"       # 도메인별 override 없으면 적용
    ingest-lag: "PT10M"
    initial-backfill: "P7D"
    off-peak-window: "01:00-06:00" # (선택) 백필/대용량 저부하 시간대
  scan:                            # 엔드포인트 스캔 부하 운영정책 (doc/33, B+A+E)
    tick-interval: "PT5M"          # B 스캔 틱(전수순회 대체) — 구 schedule.default-interval 트리거 대체
    domains-per-tick: 100          # B 틱당 도메인 예산(least-recently-scanned 상위 K)
    max-window: "PT6H"             # A per-scan 윈도우 상한(백필 슬라이스, 0=무제한)
    max-queries-per-hour: 3000     # E 전역 시간당 쿼리 하드캡(0=무제한)
    max-bytes-per-hour: 0          # E 전역 시간당 바이트 하드캡(0=무제한)
    throttle-on-error: true        # E 429/5xx 적응형 자동감속
  discovery:                       # 도메인 자동 디스커버리 (doc/30, 서버측 집계)
    enabled: true
    interval: "PT10M"              # 롤링 주기
    window: "PT12M"                # interval + 오버랩(경계 누락 방지)
    bootstrap-window: "PT1H"       # 빈 도메인 DB 첫 실행 1회
    initial-delay: "PT2M"          # 스캔 스케줄과 stagger
    max-domains-per-run: 0         # 0=무제한(전수 등록), >0=카운트 desc 상위 N 캡
    host-pattern: "^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$"
  central:
    base-url: "https://central.internal"
  normalization:                 # 고카디널리티 방지 (doc/13)
    max-templates-per-host: 5000       # host 당 distinct template 상한
    max-query-params-per-endpoint: 50  # endpoint 당 distinct query param 상한
    stat-var-ratio: 0.3                # distinct/requests 승격 임계
    stat-var-min-distinct: 20          # 소표본 오승격 방지
    stat-var-min-convergence: 0.7      # false merge 방지(수렴)
    value-len-bucket-bounds: [8, 32, 128]  # value 길이 버킷 상한(포함)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
