spring:
  application:
    name: apidiscover-worker
  task:
    scheduling:
      pool:
        size: 2               # ③ 스캐너 스레드 격리 — scanTick·discover 별 스레드(단일 풀 블로킹 기아 해소, doc/33 §14)
  datasource:
    url: jdbc:h2:mem:apidiscover;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  batch:
    job:
      enabled: false          # 잡은 스케줄러가 트리거 (기동 시 자동 실행 금지)
    jdbc:
      initialize-schema: always

# API Discovery 설정 (doc/05 §5, doc/07 §4)
# ★기본값 = 테스트 서버(192.168.8.197)에서 검증 완료된 운영 설정(D67, 2026-07-03 기준 D58~D66 튜닝 반영).
#   신규 서버는 env override 없이 기본값 배포만으로 동일 동작. 서버 고유값(DB 접속 등)만 adc.yaml env 로 주입.
apidiscover:
  loki:                       # 접속값은 sample/loki_sample.py 기준 (인증 없음)
    addr: "http://192.168.8.100:3200"
    job-label: "access_log"
    query-timeout: "30s"
    # --- 운영 서버 부하 보호 (doc/05 §2.4, §6) ---
    chunk-window: "PT30M"          # range query 1회당 시간창 (D60: PT10M→PT30M, slice 와 동반 — 쿼리수 1/3)
    page-limit: 5000               # query_range limit (유한값, 1e8 금지. D74: 2000→5000 — 26% 쿼리가 페이지네이션(최대 93p)해 페이지=예산 낭비, 상향 시 페이지수↓·truncation여유↑)
    max-concurrent-queries: 2      # Loki 동시 쿼리 상한
    min-query-interval: "200ms"    # 쿼리 간 최소 간격(스로틀)
  parse:                           # 8.3 로그 신호 필드 인덱스 (doc/40 §6). 미설정=-1=미사용(DORMANT·무회귀).
    # ★활성화 = nginx log_format 에 8.3 append 필드 추가 + 코어 배포·무회귀 확인 뒤에만 세팅(doc/40 §8).
    # acrm-field-index: 28                    # $http_access_control_request_method (CORS preflight, M3)
    # response-content-type-field-index: 24   # $sent_http_content_type → endpoint_kind (★요청측 $content_type[25] 아님)
    # accept-field-index: 26                  # $http_accept → acceptJson
    # x-requested-with-field-index: 27        # $http_x_requested_with → xRequestedWith
    # origin-field-index: 29                  # $http_origin → originHeader
    # auth-scheme-field-index: 30             # $auth_scheme → authScheme
  schedule:
    default-interval: "PT1H"       # 도메인별 override 없으면 적용
    ingest-lag: "PT10M"
    initial-backfill: "P7D"
    off-peak-window: "01:00-06:00" # (선택) 백필/대용량 저부하 시간대
  scan:                            # 엔드포인트 스캔 부하 운영정책 (doc/33, B+A+E + PR1.1 §14)
    tick-interval: "PT1M"          # B 스캔 틱(전수순회 대체) — 주야 공통 PT1M(워터마크 최대 빈도 전진, delta-skip+캡이 Loki 보호)
    domains-per-tick: 650          # B 틱당 도메인 예산(주간=off-peak 동일, 대부분 cheap skip. D74: 500→650 — 엣지축소 여유(피크 3.6k/6k q/h)로 백로그(~6h) 감축, 점진 상향 1단계)
    max-window: "PT30M"            # A per-scan 윈도우 상한(②: PT6H→PT30M, 백필 슬라이스, 0=무제한)
    slice-window: "PT30M"          # ① 부분전진 슬라이스 단위(D60: chunk-window 와 동반 PT30M)
    max-queries-per-scan: 50       # ① per-scan 하드캡(슬라이스 경계, 0=무제한=현행)
    max-queries-per-hour: 6000     # E 전역 시간당 쿼리 하드캡(0=무제한. D66 샘플링 수요 ~5-6k/h 반영 3000→6000)
    max-bytes-per-hour: 0          # E 전역 시간당 바이트 하드캡(0=무제한)
    throttle-on-error: true        # E 429/5xx 적응형 자동감속
    # --- C 활동 티어 + F dormant + D off-peak (doc/33 §4–6, D48) ---
    tiering-enabled: true          # C false=PR1 LRS 동작(무회귀 롤백 스위치)
    active-interval: "PT30M"       # C active 주기(lastSeenAt 최근)
    default-interval: "PT2H"       # lastSeenAt 부재(신호 없음)
    inactive-interval: "PT6H"      # C inactive 주기
    active-threshold: "PT24H"      # C lastSeenAt age 이내=active
    off-peak-domains-per-tick: 650 # D off-peak 틱당 도메인 K(주간과 동일 — 주야 균일, 사용자 확정. D74: 500→650 주간과 동반 상향)
    off-peak-max-window: "PT30M"   # D off-peak 윈도우 = 주간과 동일. ★PT24H 대량조회 복구 금지(Loki 과부하 이력)
    off-peak-zone: "Asia/Seoul"    # D off-peak 01-06 판정 zone(KST 실 저부하 시간대 정렬)
    dormant-after: "P14D"          # F dormant 진입 age(삭제 아님, 최장 주기로 강등)
    dormant-interval: "P1D"        # F dormant 최장 주기
    inactive-after: "P3D"          # ★무접속 중단(D59): 마지막 관측(lastSeenAt) > 이 기간이면 스캔 제외(0=비활성). 트래픽 재개 시 자동 복귀
    query-batch-size: 20           # D63 배칭: 같은 엣지 실조회 도메인 N개를 1쿼리로(0=off). D67: 10→20(실측 쿼리 -13.7%)
    edge-group-main-only: true     # D65: 엣지를 그룹 Master 로 치환 조회(Master 로그=그룹 전체 집계, 활성 매핑 -47%). false=off
    sample-window: "PT10M"         # D66 롤링 샘플링: 주기 스캔을 최신 N분 표본만(0=off=gap-free 크롤). 발산 정지·신선도=재방문주기
    # off-peak-max-queries-per-hour(쿼리캡 상향)는 범위 밖 — K·max-window 스위치만(doc/33 §5, D48)
    # schedule.off-peak-window("01:00-06:00") 재사용 — off-peak 시각대 판정
  discovery:                       # 도메인 자동 디스커버리 (doc/30, 서버측 집계)
    enabled: true
    interval: "PT10M"              # 롤링 주기
    window: "PT12M"                # interval + 오버랩(경계 누락 방지)
    bootstrap-window: "PT1H"       # 빈 도메인 DB 첫 실행 1회
    initial-delay: "PT2M"          # 스캔 스케줄과 stagger
    max-domains-per-run: 0         # 0=무제한(전수 등록), >0=카운트 desc 상위 N 캡
    host-pattern: "^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$"
    # D62 대상 제외 엣지(hostname 라벨) — 등록·lastSeen 갱신·스캔 조회 모두 제외. 빈=없음. 기본값=사용자 확정 AAJ 23개(D67 승격).
    # '*' 로 끝나는 항목은 접두 일치(D69) — "P*"=P 로 시작하는 전 엣지(사용자 확정: API 검색 로그 대상 아님).
    # "NEW-PAJ*"(doc/42 §4.1 A): 봇 Host 주요 유입 캐치올 엣지 5종(NEW-PAJ21/31/41/51/61) 접두 제외.
    excluded-hostnames: [AAJ11, AAJ12, AAJ13, AAJ14, AAJ21, AAJ22, AAJ23, AAJ24, AAJ31, AAJ32, AAJ33, AAJ34,
                         AAJ41, AAJ42, AAJ43, AAJ44, AAJ51, AAJ52, AAJ53, AAJ54, AAJ61, AAJ62, AAJ63, "P*", "NEW-PAJ*"]
    # C(doc/42 §4.4) 프로브 status 신뢰필터 — 이 status 만 관측된 Host 는 등록·lastSeen 갱신 배제(스푸핑/프로브 억제).
    # 404=미존재 vhost, 470=WAAP 차단(PAN 스캐너 실측). 빈 리스트=필터 없음(무회귀). 서버측 LogQL 라벨 필터.
    probe-statuses: [404, 470]
  central:
    base-url: "https://central.internal"
  normalization:                 # 고카디널리티 방지 (doc/13)
    max-templates-per-host: 5000       # host 당 distinct template 상한
    max-query-params-per-endpoint: 50  # endpoint 당 distinct query param 상한
    stat-var-ratio: 0.3                # distinct/requests 승격 임계
    stat-var-min-distinct: 20          # 소표본 오승격 방지
    stat-var-min-convergence: 0.7      # false merge 방지(수렴)
    value-len-bucket-bounds: [8, 32, 128]  # value 길이 버킷 상한(포함)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
